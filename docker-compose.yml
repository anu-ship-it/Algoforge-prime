services:

  postgres:
    image: postgres:16-alpine
    container_name: algoforge_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: algoforge
      POSTGRES_PASSWORD: algoforge_secret
      POSTGRES_DB: algoforge
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/sql/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U algoforge"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: algoforge_redis
    restart: unless-stopped
    command: redis-server --requirepass redis_secret
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "redis_secret", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  ollama:
    image: ollama/ollama:latest
    container_name: algoforge_ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    entrypoint: ["/bin/sh", "-c", "ollama serve & sleep 8 && ollama pull llama3 && wait"]

  judge0_db:
    image: postgres:13-alpine
    container_name: algoforge_judge0_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: judge0
      POSTGRES_PASSWORD: judge0_secret
      POSTGRES_DB: judge0
    volumes:
      - judge0_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U judge0"]
      interval: 10s
      timeout: 5s
      retries: 5

  judge0_redis:
    image: redis:6-alpine
    container_name: algoforge_judge0_redis
    restart: unless-stopped

  judge0:
    image: judge0/judge0:1.13.1
    container_name: algoforge_judge0
    restart: unless-stopped
    ports:
      - "2358:2358"
    volumes:
      - ./sandbox/judge0.conf:/judge0.conf
    privileged: true
    depends_on:
      judge0_db:
        condition: service_healthy
      judge0_redis:
        condition: service_started

  judge0_worker:
    image: judge0/judge0:1.13.1
    container_name: algoforge_judge0_worker
    restart: unless-stopped
    command: ["./scripts/workers"]
    volumes:
      - ./sandbox/judge0.conf:/judge0.conf
    privileged: true
    depends_on:
      judge0:
        condition: service_started
      judge0_db:
        condition: service_healthy
      judge0_redis:
        condition: service_started

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: algoforge_backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    ports:
      - "4000:4000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      ollama:
        condition: service_started
      judge0:
        condition: service_started
    volumes:
      - ./backend:/app
      - /app/node_modules

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: algoforge_frontend
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:4000
      NEXT_PUBLIC_WS_URL: ws://localhost:4000
    ports:
      - "3000:3000"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next

  nginx:
    image: nginx:alpine
    container_name: algoforge_nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - frontend
      - backend

volumes:
  postgres_data:
  ollama_data:
  judge0_db_data: